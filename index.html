<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DCA Tracker Pro - Cloud Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #2563eb; --success: #10b981; --danger: #ef4444;
            --bg: #f8fafc; --card: #ffffff; --text-main: #1e293b;
            --text-muted: #64748b; --border: #e2e8f0;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; position: relative; }

        /* Auth UI */
        .auth-overlay { position: fixed; inset: 0; background: radial-gradient(circle at top right, #e2e8f0, #f8fafc); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: white; padding: 50px 40px; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.15); text-align: center; max-width: 440px; width: 90%; border: 1px solid rgba(255, 255, 255, 0.7); }

        .btn-google { background: #ffffff; border: 1px solid #dadce0; color: #3c4043; width: 100%; padding: 12px; border-radius: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; font-size: 16px; }
        .btn-google:hover { background: #f7f8f9; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        /* Header Bar */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 10px 0; }
        .user-info { display: flex; flex-direction: column; }
        .user-email { font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .btn-logout { background: white; border: 1.5px solid var(--danger); color: var(--danger); padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        /* Tabs */
        .tabs-container { overflow-x: auto; display: flex; background: #e2e8f0; padding: 6px; border-radius: 16px; margin-bottom: 20px; scrollbar-width: none; }
        .tabs-container button { flex: 0 0 auto; padding: 10px 22px; font-weight: 700; border: none; border-radius: 12px; background: transparent; cursor: pointer; color: var(--text-muted); border-bottom: 3px solid transparent; }
        .tabs-container button.active { background: var(--card); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .tabs-container button.active[data-coin="BTC"] { color: #F7931A; border-bottom-color: #F7931A; }
        .tabs-container button.active[data-coin="ETH"] { color: #627EEA; border-bottom-color: #627EEA; }
        .tabs-container button.active[data-coin="SUMMARY"] { color: var(--primary); border-bottom-color: var(--primary); }

        /* Summary Card Design */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .asset-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); position: relative; transition: transform 0.2s; cursor: pointer; }
        .asset-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .asset-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .asset-logo { width: 32px; height: 32px; border-radius: 50%; }
        .asset-name { font-weight: 800; font-size: 18px; }
        .asset-badge { margin-left: auto; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; }
        .asset-body { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .data-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .data-value { font-size: 14px; font-weight: 700; margin-top: 2px; }

        .card { background: var(--card); padding: 24px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; overflow: hidden; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .stat-item { padding: 10px; border-left: 4px solid #f1f5f9; }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; }
        .stat-value { font-size: 18px; font-weight: 800; margin-top: 6px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 3000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card { background: white; padding: 32px; border-radius: 24px; max-width: 400px; width: 90%; text-align: center; }

        .calc-box { background: #f1f5f9; border-radius: 16px; padding: 20px; margin-top: 20px; text-align: left; }
        .calc-res { background: var(--primary); color: white; padding: 15px; border-radius: 12px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        
        .profit { color: var(--success); } .loss { color: var(--danger); }
        .profit-bg { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .loss-bg { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .hidden { display: none !important; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { text-align: left; padding: 16px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-card">
        <h4>Konfirmasi Hapus</h4>
        <div style="display:flex; gap:10px;">
            <button class="btn-modal" style="background:#f1f5f9" onclick="closeModal()">Batal</button>
            <button class="btn-modal" style="background:var(--danger); color:white" id="confirmDeleteBtn">Hapus</button>
        </div>
    </div>
</div>

<div id="calcModal" class="modal-overlay">
    <div class="modal-card" style="max-width: 450px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h4>🧮 DCA Calculator</h4>
            <button onclick="closeCalc()" style="background:none; border:none; cursor:pointer; font-size:20px;">✕</button>
        </div>
        <div class="calc-box">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                <div><label>Nominal Beli ($)</label><input type="number" id="calcNominal" oninput="calculateDCA()"></div>
                <div><label>Harga Beli ($)</label><input type="number" id="calcPrice" oninput="calculateDCA()"></div>
            </div>
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px;" id="calcCurrentInfo"></div>
            <div class="calc-res"><span>New Avg Price</span><span id="resAvg">$0.00</span></div>
            <div style="margin-top: 10px; font-size: 13px; font-weight: 700;" id="resDiff">Change: 0%</div>
        </div>
        <button class="btn-primary" style="margin-top:20px;" onclick="closeCalc()">Selesai</button>
    </div>
</div>

<div id="appScreen" class="container">
    <div class="header-bar">
        <div class="user-info">
            <span style="font-size: 10px; color: var(--text-muted);">LOGGED IN AS</span>
            <span id="userEmail" class="user-email">...</span>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <h2>DCA Tracker Pro</h2>
    <div class="tabs-container" id="menuTabs"></div>

    <div class="card" id="inputCard">
        <div class="grid-inputs">
            <div><label>Tipe</label><select id="tipe"><option value="BUY">BUY</option><option value="SELL">SELL/TP</option></select></div>
            <div><label>Tanggal</label><input type="date" id="tanggal"></div>
            <div><label>Harga ($)</label><input type="number" id="harga" placeholder="0.00"></div>
            <div><label>Nominal ($)</label><input type="number" id="nominal" placeholder="0.00"></div>
        </div>
        <div class="btn-group">
            <button class="btn-primary" onclick="tambah()">Simpan ke Cloud</button>
            <button class="btn-action" onclick="openCalc()">🧮 Calc</button>
            <button class="btn-action" onclick="togglePrivacy()" id="privacyBtn">🔒</button>
        </div>
    </div>

    <div class="card stats-grid">
        <div class="stat-item">
            <div class="stat-label" id="labelTotal">Net Investasi</div>
            <div class="stat-value" id="totalModal">0</div>
        </div>
        <div class="stat-item" id="livePriceContainer">
            <div class="stat-label">Live Price</div>
            <div class="stat-value" id="livePrice" style="color:var(--primary)">0</div>
        </div>
        <div class="stat-item"><div class="stat-label">Floating P/L</div><div class="stat-value" id="upl">0</div></div>
        <div class="stat-item"><div class="stat-label">P/L (%)</div><div class="stat-value" id="uplPct">0%</div></div>
    </div>

    <div class="card" id="chartCard" style="height: 250px;"><canvas id="performanceChart"></canvas></div>

    <div id="summaryDisplay" class="summary-grid"></div>
    <div class="card hidden" id="tableCard">
        <div class="table-wrapper">
            <table><thead id="tableHead"></thead><tbody id="tabel"></tbody></table>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://iuqzuuyihrnangontxft.supabase.co';
const SUPABASE_KEY = 'sb_publishable_-26nDiKXaT6IkPJiTplAdQ_CV5H-MHm';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const assets = [
    { id: 'BTC', name: 'Bitcoin', geckoId: 'bitcoin', color: '#F7931A', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/btc.png' },
    { id: 'ETH', name: 'Ethereum', geckoId: 'ethereum', color: '#627EEA', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/eth.png' },
    { id: 'SOL', name: 'Solana', geckoId: 'solana', color: '#A464FA', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/sol.png' },
    { id: 'BNB', name: 'Binance', geckoId: 'binancecoin', color: '#F3BA2F', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/bnb.png' },
    { id: 'SUI', name: 'Sui', geckoId: 'sui', color: '#6FBCF0', icon: '💧' },
    { id: 'PAXG', name: 'Gold', geckoId: 'pax-gold', color: '#D4AF37', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/paxg.png' }
];

let currentUser = null, currentTab = "SUMMARY", privacy = false, livePrices = {}, data = {}, chartInstance = null;

function calculateDCA() {
    let m = 0, q = 0;
    data[currentTab]?.forEach(d => { m += d.tipe === 'BUY' ? d.nominal : -d.nominal; q += d.qty; });
    const oldAvg = m/q || 0;
    const nNom = Number(document.getElementById('calcNominal').value) || 0;
    const nPri = Number(document.getElementById('calcPrice').value) || 0;
    if (nPri > 0) {
        const nQty = nNom / nPri;
        const nAvg = (m + nNom) / (q + nQty);
        document.getElementById('resAvg').innerText = "$" + fmt(nAvg);
        const diff = ((nAvg - oldAvg) / oldAvg * 100);
        document.getElementById('resDiff').innerText = `Change: ${diff.toFixed(2)}%`;
        document.getElementById('resDiff').style.color = diff <= 0 ? 'var(--success)' : 'var(--danger)';
    }
}

function openCalc() {
    if (currentTab === "SUMMARY") return alert("Pilih satu koin dulu.");
    document.getElementById('calcModal').classList.add('active');
    let m = 0, q = 0;
    data[currentTab]?.forEach(d => { m += d.tipe === 'BUY' ? d.nominal : -d.nominal; q += d.qty; });
    document.getElementById('calcCurrentInfo').innerText = `Balance: ${q.toFixed(4)} | Avg: $${fmt(m/q || 0)}`;
    document.getElementById('calcPrice').value = livePrices[currentTab] || 0;
    calculateDCA();
}

function closeCalc() { document.getElementById('calcModal').classList.remove('active'); }

function render() {
    const summaryDiv = document.getElementById("summaryDisplay");
    const tableCard = document.getElementById("tableCard");
    const tbody = document.getElementById("tabel"), tableHead = document.getElementById("tableHead");
    document.getElementById("privacyBtn").innerHTML = privacy ? "🔓" : "🔒";

    if (currentTab === "SUMMARY") {
        summaryDiv.className = "summary-grid";
        tableCard.className = "card hidden";
        let totalM = 0, totalV = 0, cardsHTML = "";

        assets.forEach(a => {
            let m = 0, q = 0; 
            data[a.id]?.forEach(d => { m += d.tipe === 'BUY' ? d.nominal : -d.nominal; q += d.qty; });
            if (q > 0.00000001) {
                let lp = livePrices[a.id] || 0, v = q * lp, p = v - m, pct = m > 0 ? (p/m*100) : 0;
                totalM += m; totalV += v;
                cardsHTML += `
                <div class="asset-card" onclick="switchTab('${a.id}')">
                    <div class="asset-header">
                        <img src="${a.logo || ''}" class="asset-logo" onerror="this.src='https://via.placeholder.com/32'">
                        <span class="asset-name">${a.id}</span>
                        <span class="asset-badge ${p>=0?'profit-bg':'loss-bg'}">${pct.toFixed(2)}%</span>
                    </div>
                    <div class="asset-body">
                        <div><div class="data-label">Avg. Price</div><div class="data-value">$${fmt(m/q)}</div></div>
                        <div><div class="data-label">Total Qty</div><div class="data-value">${privacy?'•••':q.toFixed(6)}</div></div>
                        <div><div class="data-label">Market Value</div><div class="data-value">${privacy?'•••':'$'+fmt(v)}</div></div>
                        <div><div class="data-label">Floating P/L</div><div class="data-value ${p>=0?'profit':'loss'}">${privacy?'•••':(p>=0?'+':'')+'$'+fmt(p)}</div></div>
                    </div>
                </div>`;
            }
        });
        summaryDiv.innerHTML = cardsHTML || "<div class='card'>Belum ada data investasi.</div>";
        const tUPL = totalV - totalM;
        document.getElementById("totalModal").innerText = privacy ? "••••" : "$" + fmt(totalV);
        document.getElementById("upl").innerText = privacy ? "••••" : (tUPL>=0?"+":"") + "$" + fmt(tUPL);
        document.getElementById("uplPct").innerText = totalM > 0 ? (tUPL/totalM*100).toFixed(2) + "%" : "0%";
    } else {
        summaryDiv.className = "summary-grid hidden";
        tableCard.className = "card";
        tableHead.innerHTML = `<tr><th>Tipe</th><th>Tanggal</th><th>Harga</th><th>Nominal</th><th>Qty</th><th></th></tr>`;
        let m = 0, q = 0, rows = "";
        (data[currentTab] || []).forEach(d => {
            m += d.tipe === 'BUY' ? d.nominal : -d.nominal; q += d.qty;
            rows += `<tr><td style="color:${d.tipe==='BUY'?'var(--success)':'var(--danger)'};font-weight:700">${d.tipe}</td><td>${d.tanggal}</td><td>$${fmt(d.harga)}</td><td>${privacy?'••':'$'+fmt(d.nominal)}</td><td>${privacy?'••':d.qty.toFixed(6)}</td><td onclick="openModal(${d.id})" style="color:red;cursor:pointer;font-weight:bold">X</td></tr>`;
        });
        tbody.innerHTML = rows;
        let lp = livePrices[currentTab] || 0, v = q * lp, p = v - m;
        document.getElementById("totalModal").innerText = privacy ? "••••" : "$" + fmt(m);
        document.getElementById("livePrice").innerText = "$" + fmt(lp);
        document.getElementById("upl").innerText = privacy ? "••••" : (p>=0?"+":"") + "$" + fmt(p);
        document.getElementById("uplPct").innerText = m > 0 ? (p/m*100).toFixed(2) + "%" : "0%";
    }
}

// Fungsi lainnya tetap sama (switchTab, loadData, tambah, dll)
function switchTab(id) {
    currentTab = id; renderTabs();
    document.getElementById("inputCard").className = id === "SUMMARY" ? "card hidden" : "card";
    document.getElementById("chartCard").className = id === "SUMMARY" ? "card hidden" : "card";
    document.getElementById("livePriceContainer").className = id === "SUMMARY" ? "stat-item hidden" : "stat-item";
    if (id !== "SUMMARY") setTimeout(initChart, 100);
    render();
}

function renderTabs() {
    const container = document.getElementById('menuTabs');
    let html = `<button class="${currentTab === 'SUMMARY' ? 'active' : ''}" data-coin="SUMMARY" onclick="switchTab('SUMMARY')">SUMMARY</button>`;
    html += assets.map(a => `<button class="${currentTab === a.id ? 'active' : ''}" data-coin="${a.id}" onclick="switchTab('${a.id}')">${a.id}</button>`).join('');
    container.innerHTML = html;
}

async function loadData() {
    const { data: dbData } = await _supabase.from('transaksi').select('*').order('tanggal', { ascending: true });
    assets.forEach(a => data[a.id] = []);
    dbData?.forEach(item => { if (data[item.asset_id]) data[item.asset_id].push(item); });
    render();
}

async function fetchPrices() {
    try {
        const ids = assets.map(a => a.geckoId).join(',');
        const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
        const json = await res.json();
        assets.forEach(a => { if (json[a.geckoId]) livePrices[a.id] = json[a.geckoId].usd; });
        render();
    } catch(e) {}
}

async function checkUser() {
    const { data: { user } } = await _supabase.auth.getUser();
    if (user) { currentUser = user; document.getElementById('userEmail').innerText = user.email; loadData(); }
}

async function tambah() {
    const tipe = document.getElementById("tipe").value, tgl = document.getElementById("tanggal").value;
    const harga = Number(document.getElementById("harga").value), nominal = Number(document.getElementById("nominal").value);
    if(!tgl || !harga || !nominal) return alert("Lengkapi data!");
    let qtyIn = nominal/harga;
    await _supabase.from('transaksi').insert([{ user_id: currentUser.id, asset_id: currentTab, tipe, tanggal: tgl, harga, nominal, qty: tipe === "BUY" ? qtyIn : -qtyIn }]);
    loadData();
}

function openModal(id) {
    document.getElementById('confirmModal').classList.add('active');
    document.getElementById('confirmDeleteBtn').onclick = async () => {
        await _supabase.from('transaksi').delete().eq('id', id);
        closeModal(); loadData();
    };
}
function closeModal() { document.getElementById('confirmModal').classList.remove('active'); }
function fmt(n) { return Number(n).toLocaleString(undefined, { maximumFractionDigits: 2 }); }
function togglePrivacy() { privacy = !privacy; render(); }
function logout() { _supabase.auth.signOut().then(() => location.reload()); }
function initChart() { /* Chart.js Logic */ }

(async () => { await fetchPrices(); await checkUser(); setInterval(fetchPrices, 60000); })();
</script>
</body>
</html>
