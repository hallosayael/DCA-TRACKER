<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DCA Tracker Pro - Cloud Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #2563eb; --success: #10b981; --danger: #ef4444;
            --bg: #f8fafc; --card: #ffffff; --text-main: #1e293b;
            --text-muted: #64748b; --border: #e2e8f0; --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text-main: #f1f5f9;
            --text-muted: #94a3b8; --border: #334155; --input-bg: #1e293b;
        }

        * { box-sizing: border-box; transition: background 0.2s, border-color 0.2s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; }

        /* Header */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-theme { background: var(--card); border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; border-radius: 10px; cursor: pointer; }
        .btn-logout { background: transparent; border: 1.5px solid var(--danger); color: var(--danger); padding: 8px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 11px; }

        /* Tabs */
        .tabs-container { overflow-x: auto; display: flex; background: var(--border); padding: 6px; border-radius: 16px; margin-bottom: 20px; gap: 4px; }
        .tabs-container button { flex: 0 0 auto; padding: 10px 20px; font-weight: 800; border: none; border-radius: 12px; background: transparent; cursor: pointer; color: var(--text-muted); border-bottom: 3px solid transparent; }
        .tabs-container button.active { background: var(--card); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs-container button.active[data-coin="BTC"] { color: #F7931A; border-bottom-color: #F7931A; }
        .tabs-container button.active[data-coin="ETH"] { color: #627EEA; border-bottom-color: #627EEA; }
        .tabs-container button.active[data-coin="SOL"] { color: #A464FA; border-bottom-color: #A464FA; }
        .tabs-container button.active[data-coin="BNB"] { color: #F3BA2F; border-bottom-color: #F3BA2F; }
        .tabs-container button.active[data-coin="SUI"] { color: #6FBCF0; border-bottom-color: #6FBCF0; }
        .tabs-container button.active[data-coin="PAXG"] { color: #D4AF37; border-bottom-color: #D4AF37; }
        .tabs-container button.active[data-coin="SUMMARY"] { color: var(--primary); border-bottom-color: var(--primary); }

        /* Card Summary Grid */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .asset-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; position: relative; transition: transform 0.2s; }
        .asset-card:hover { transform: translateY(-3px); }
        .asset-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .asset-logo { width: 35px; height: 35px; }
        .asset-name-group { display: flex; flex-direction: column; }
        .asset-symbol { font-weight: 800; font-size: 18px; }
        .asset-pct-badge { margin-left: auto; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 800; }

        .asset-card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid var(--border); padding-top: 15px; }
        .asset-data-point { display: flex; flex-direction: column; }
        .asset-label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        .asset-value { font-size: 14px; font-weight: 700; }

        /* Stats & Utils */
        .card { background: var(--card); padding: 24px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .stat-item { padding: 10px; border-left: 4px solid var(--border); }
        .stat-value { font-size: 18px; font-weight: 800; margin-top: 5px; }
        .profit { color: var(--success) !important; } .loss { color: var(--danger) !important; }
        .profit-bg { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .loss-bg { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        input, select { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border); padding: 12px; border-radius: 10px; width: 100%; outline: none; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; }
        .btn-action { background: var(--border); color: var(--text-main); border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; flex: 1; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 3000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card { background: var(--card); padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; border: 1px solid var(--border); }

        .calc-box { background: var(--bg); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin: 15px 0; }
        .calc-res { background: var(--primary); color: white; padding: 12px; border-radius: 10px; font-weight: 800; display: flex; justify-content: space-between; }
        .hidden { display: none !important; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { text-align: left; padding: 16px; border-bottom: 1px solid var(--border); }
        #shareCanvas { display: none; }
    </style>
</head>
<body>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-card">
        <h3>Hapus Transaksi?</h3>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-action" onclick="closeModal()">Batal</button>
            <button class="btn-primary" style="background:var(--danger); flex:1" id="confirmDeleteBtn">Hapus</button>
        </div>
    </div>
</div>

<div id="calcModal" class="modal-overlay">
    <div class="modal-card">
        <h3 style="margin:0 0 15px 0">🧮 DCA Calculator</h3>
        <div class="calc-box">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                <div><label style="font-size:10px">NOMINAL ($)</label><input type="number" id="calcNominal" oninput="calculateDCA()"></div>
                <div><label style="font-size:10px">HARGA ($)</label><input type="number" id="calcPrice" oninput="calculateDCA()"></div>
            </div>
            <div id="calcCurrentInfo" style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px;"></div>
            <div class="calc-res"><span>New Avg Price</span><span id="resAvg">$0.00</span></div>
            <div id="resDiff" style="margin-top:10px; font-weight:700; font-size:13px;">Change: 0%</div>
        </div>
        <button class="btn-primary" onclick="closeCalc()">Tutup</button>
    </div>
</div>

<div id="appScreen" class="container">
    <div class="header-bar">
        <div class="user-info">
            <span style="font-size: 10px; color: var(--text-muted);">LOGGED IN AS</span>
            <span id="userEmail" class="user-email">...</span>
        </div>
        <div class="header-actions">
            <button class="btn-theme" onclick="toggleDarkMode()">🌓 Mode</button>
            <button class="btn-logout" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <h2 style="text-align:center">DCA Tracker Pro</h2>
    <div class="tabs-container" id="menuTabs"></div>

    <div class="card" id="inputCard">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap:15px;">
            <div><label style="font-size:10px">TIPE</label><select id="tipe"><option value="BUY">BUY</option><option value="SELL">SELL/TP</option></select></div>
            <div><label style="font-size:10px">TANGGAL</label><input type="date" id="tanggal"></div>
            <div><label style="font-size:10px">HARGA ($)</label><input type="number" id="harga" placeholder="0.00"></div>
            <div><label style="font-size:10px">NOMINAL ($)</label><input type="number" id="nominal" placeholder="0.00"></div>
        </div>
        <div style="display:flex; flex-wrap: wrap; gap:10px; margin-top:15px;">
            <button class="btn-primary" onclick="tambah()" style="flex: 2 1 200px;">SIMPAN KE CLOUD</button>
            <button class="btn-action" onclick="openCalc()">🧮 CALC</button>
            <button class="btn-action" onclick="generateShareImage()">📸 SHARE</button>
            <button class="btn-action" onclick="exportCSV()">📊 EXCEL</button>
            <button class="btn-action" onclick="togglePrivacy()" id="privacyBtn" style="flex: 0 0 50px;">🔒</button>
        </div>
    </div>

    <div class="card stats-grid">
        <div class="stat-item"><div>NET INVESTASI</div><div class="stat-value" id="totalModal">0</div></div>
        <div class="stat-item" id="livePriceContainer"><div>LIVE PRICE</div><div class="stat-value" id="livePrice" style="color:var(--primary)">0</div></div>
        <div class="stat-item"><div>FLOATING P/L</div><div class="stat-value" id="upl">0</div></div>
        <div class="stat-item"><div>P/L (%)</div><div class="stat-value" id="uplPct">0%</div></div>
    </div>

    <div class="card" id="chartCard" style="height: 250px;"><canvas id="performanceChart"></canvas></div>

    <div id="mainContent">
        <div id="summaryCards" class="summary-grid"></div>
        <div id="transactionTable" class="card hidden">
            <div class="table-wrapper">
                <table><thead id="tableHead"></thead><tbody id="tabel"></tbody></table>
            </div>
        </div>
    </div>
</div>

<canvas id="shareCanvas" width="800" height="450"></canvas>

<script>
const SUPABASE_URL = 'https://iuqzuuyihrnangontxft.supabase.co';
const SUPABASE_KEY = 'sb_publishable_-26nDiKXaT6IkPJiTplAdQ_CV5H-MHm';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const assets = [
    { id: 'BTC', name: 'Bitcoin', geckoId: 'bitcoin', color: '#F7931A', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/btc.png' },
    { id: 'ETH', name: 'Ethereum', geckoId: 'ethereum', color: '#627EEA', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/eth.png' },
    { id: 'SOL', name: 'Solana', geckoId: 'solana', color: '#A464FA', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/sol.png' },
    { id: 'BNB', name: 'Binance', geckoId: 'binancecoin', color: '#F3BA2F', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/bnb.png' },
    { id: 'SUI', name: 'Sui', geckoId: 'sui', color: '#6FBCF0', icon: '💧' },
    { id: 'PAXG', name: 'Gold', geckoId: 'pax-gold', color: '#D4AF37', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/paxg.png' }
];

let currentUser = null, currentTab = "SUMMARY", privacy = false, livePrices = {}, data = {}, chartInstance = null;

function toggleDarkMode() {
    const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
}

function openCalc() {
    if (currentTab === "SUMMARY") return alert("Pilih satu koin dulu.");
    document.getElementById('calcModal').classList.add('active');
    let m = 0, q = 0;
    data[currentTab]?.forEach(d => { m += (d.tipe === 'BUY' ? d.nominal : -d.nominal); q += d.qty; });
    document.getElementById('calcCurrentInfo').innerText = `Saldo: ${q.toFixed(4)} | Avg: $${fmt(m/q || 0)}`;
    calculateDCA();
}
function closeCalc() { document.getElementById('calcModal').classList.remove('active'); }

function calculateDCA() {
    let m = 0, q = 0;
    data[currentTab]?.forEach(d => { m += (d.tipe === 'BUY' ? d.nominal : -d.nominal); q += d.qty; });
    const oldAvg = m/q || 0;
    const nNom = Number(document.getElementById('calcNominal').value) || 0;
    const nPri = Number(document.getElementById('calcPrice').value) || 0;
    if (nPri > 0) {
        const nAvg = (m + nNom) / (q + (nNom/nPri));
        document.getElementById('resAvg').innerText = "$" + fmt(nAvg);
        const diff = ((nAvg - oldAvg) / oldAvg * 100);
        document.getElementById('resDiff').innerText = `Change: ${diff.toFixed(2)}%`;
        document.getElementById('resDiff').className = diff <= 0 ? 'profit' : 'loss';
    }
}

async function loadData() {
    const { data: dbData } = await _supabase.from('transaksi').select('*').order('tanggal', { ascending: true });
    assets.forEach(a => data[a.id] = []);
    dbData?.forEach(item => { if (data[item.asset_id]) data[item.asset_id].push(item); });
    render();
}

function renderTabs() {
    const container = document.getElementById('menuTabs');
    let html = `<button class="${currentTab === 'SUMMARY' ? 'active' : ''}" data-coin="SUMMARY" onclick="switchTab('SUMMARY')">SUMMARY</button>`;
    html += assets.map(a => `<button class="${currentTab === a.id ? 'active' : ''}" data-coin="${a.id}" onclick="switchTab('${a.id}')">${a.id}</button>`).join('');
    container.innerHTML = html;
}

function switchTab(id) {
    currentTab = id; renderTabs();
    document.getElementById("inputCard").className = id === "SUMMARY" ? "card hidden" : "card";
    document.getElementById("chartCard").className = id === "SUMMARY" ? "card hidden" : "card";
    document.getElementById("livePriceContainer").className = id === "SUMMARY" ? "stat-item hidden" : "stat-item";
    document.getElementById("summaryCards").className = id === "SUMMARY" ? "summary-grid" : "hidden";
    document.getElementById("transactionTable").className = id === "SUMMARY" ? "hidden" : "card";
    if (id !== "SUMMARY") setTimeout(initChart, 100);
    render();
}

function render() {
    const summaryContainer = document.getElementById("summaryCards");
    const tbody = document.getElementById("tabel"), tableHead = document.getElementById("tableHead");
    document.getElementById("privacyBtn").innerHTML = privacy ? "🔓" : "🔒";

    if (currentTab === "SUMMARY") {
        let totalM = 0, totalV = 0, cardsHTML = "";
        assets.forEach(a => {
            let m = 0, q = 0; 
            data[a.id]?.forEach(d => { m += (d.tipe === 'BUY' ? d.nominal : -d.nominal); q += d.qty; });
            if (q > 0.00000001) {
                let lp = livePrices[a.id] || 0, v = q * lp, p = v - m, pct = m > 0 ? (p/m*100) : 0;
                totalM += m; totalV += v;
                
                cardsHTML += `
                <div class="asset-card" onclick="switchTab('${a.id}')" style="cursor:pointer">
                    <div class="asset-card-header">
                        <img src="${a.logo || ''}" class="asset-logo" onerror="this.src='https://via.placeholder.com/32'">
                        <div class="asset-name-group">
                            <span class="asset-symbol">${a.id}</span>
                        </div>
                        <div class="asset-pct-badge ${p >= 0 ? 'profit-bg' : 'loss-bg'}">${pct.toFixed(2)}%</div>
                    </div>
                    <div class="asset-card-body">
                        <div class="asset-data-point">
                            <span class="asset-label">Avg. Price</span>
                            <span class="asset-value">$${fmt(m/q)}</span>
                        </div>
                        <div class="asset-data-point">
                            <span class="asset-label">Balance</span>
                            <span class="asset-value">${privacy ? '•••' : q.toFixed(6)}</span>
                        </div>
                        <div class="asset-data-point">
                            <span class="asset-label">Market Value</span>
                            <span class="asset-value">${privacy ? '•••' : '$'+fmt(v)}</span>
                        </div>
                        <div class="asset-data-point">
                            <span class="asset-label">Floating P/L</span>
                            <span class="asset-value ${p>=0?'profit':'loss'}">${privacy ? '•••' : (p>=0?'+':'')+'$'+fmt(p)}</span>
                        </div>
                    </div>
                </div>`;
            }
        });
        summaryContainer.innerHTML = cardsHTML || '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted)">Belum ada data.</div>';
        const tUPL = totalV - totalM;
        document.getElementById("totalModal").innerText = privacy ? "••••" : "$" + fmt(totalV);
        document.getElementById("upl").innerText = privacy ? "••••" : (tUPL >= 0 ? "+" : "") + "$" + fmt(tUPL);
        document.getElementById("upl").className = "stat-value " + (tUPL >= 0 ? "profit" : "loss");
        document.getElementById("uplPct").innerText = totalM > 0 ? (tUPL/totalM*100).toFixed(2) + "%" : "0%";
        document.getElementById("uplPct").className = "stat-value " + (tUPL >= 0 ? "profit" : "loss");
    } else {
        tableHead.innerHTML = `<tr><th>Tipe</th><th>Tanggal</th><th>Harga</th><th>Nominal</th><th>Qty</th><th></th></tr>`;
        let m = 0, q = 0, rows = "";
        (data[currentTab] || []).forEach(d => {
            m += (d.tipe === 'BUY' ? d.nominal : -d.nominal); q += d.qty;
            rows += `<tr><td class="${d.tipe==='BUY'?'profit':'loss'}" style="font-weight:800">${d.tipe}</td><td>${d.tanggal}</td><td>$${fmt(d.harga)}</td><td>${privacy?'••':'$'+fmt(d.nominal)}</td><td>${privacy?'••':d.qty.toFixed(6)}</td><td onclick="openDel(${d.id})" style="color:red; cursor:pointer">X</td></tr>`;
        });
        tbody.innerHTML = rows;
        let lp = livePrices[currentTab] || 0, v = q * lp, p = v - m;
        document.getElementById("totalModal").innerText = privacy ? "••••" : "$" + fmt(m);
        document.getElementById("livePrice").innerText = lp > 0 ? "$" + fmt(lp) : "OFFLINE";
        document.getElementById("upl").innerText = privacy ? "••••" : (p >= 0 ? "+" : "") + "$" + fmt(p);
        document.getElementById("upl").className = "stat-value " + (p >= 0 ? "profit" : "loss");
        document.getElementById("uplPct").innerText = m > 0 ? (p/m*100).toFixed(2) + "%" : "0%";
        document.getElementById("uplPct").className = "stat-value " + (p >= 0 ? "profit" : "loss");
    }
}

async function tambah() {
    const tipe = document.getElementById("tipe").value, tgl = document.getElementById("tanggal").value;
    const harga = Number(document.getElementById("harga").value), nominal = Number(document.getElementById("nominal").value);
    if(!tgl || !harga || !nominal) return alert("Lengkapi data!");
    let curQ = (data[currentTab] || []).reduce((a, b) => a + b.qty, 0);
    let qtyIn = nominal/harga;
    if(tipe === "SELL" && qtyIn > (curQ + 0.00000001)) return alert("Saldo tidak cukup!");
    await _supabase.from('transaksi').insert([{ user_id: currentUser.id, asset_id: currentTab, tipe, tanggal: tgl, harga, nominal, qty: tipe === "BUY" ? qtyIn : -qtyIn }]);
    loadData(); document.getElementById("harga").value = ""; document.getElementById("nominal").value = "";
}

function openDel(id) { 
    document.getElementById('confirmModal').classList.add('active'); 
    document.getElementById('confirmDeleteBtn').onclick = async () => {
        await _supabase.from('transaksi').delete().eq('id', id);
        closeModal(); loadData();
    };
}
function closeModal() { document.getElementById('confirmModal').classList.remove('active'); }

function generateShareImage() {
    if(currentTab === "SUMMARY") return alert("Pilih koin spesifik.");
    const asset = assets.find(a => a.id === currentTab);
    const canvas = document.getElementById("shareCanvas"), ctx = canvas.getContext("2d");
    let m = 0, q = 0; data[currentTab]?.forEach(d => { m += (d.tipe === 'BUY' ? d.nominal : -d.nominal); q += d.qty; });
    const lp = livePrices[currentTab] || 0, p = (q * lp) - m, pct = m > 0 ? (p/m*100) : 0;
    ctx.fillStyle = "#0f172a"; ctx.fillRect(0,0,800,450);
    ctx.fillStyle = "white"; ctx.font = "bold 32px Inter"; ctx.fillText(`${asset.name} Performance`, 50, 70);
    ctx.fillStyle = p >= 0 ? "#10b981" : "#ef4444"; ctx.font = "bold 100px Inter"; ctx.fillText(`${pct.toFixed(2)}%`, 50, 250);
    const link = document.createElement('a'); link.download = `PNL_${currentTab}.png`; link.href = canvas.toDataURL(); link.click();
}

function exportCSV() {
    if(currentTab === "SUMMARY") return alert("Pilih koin spesifik.");
    let csv = "Tipe,Tanggal,Harga,Nominal,Qty\n";
    data[currentTab].forEach(d => csv += `${d.tipe},${d.tanggal},${d.harga},${d.nominal},${d.qty}\n`);
    const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); link.download = `DCA_${currentTab}.csv`; link.click();
}

async function fetchPrices() {
    try {
        const ids = assets.map(a => a.geckoId).join(',');
        const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
        const json = await res.json();
        assets.forEach(a => { if (json[a.geckoId]) livePrices[a.id] = json[a.geckoId].usd; });
        render();
    } catch(e) {}
}

function initChart() {
    const ctx = document.getElementById('performanceChart'); if (!ctx) return;
    if (chartInstance) chartInstance.destroy();
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    let labels = [], points = [], running = 0;
    data[currentTab]?.forEach(d => { labels.push(d.tanggal); running += (d.tipe === 'BUY' ? d.nominal : -d.nominal); points.push(running); });
    chartInstance = new Chart(ctx, { 
        type: 'line', 
        data: { labels, datasets: [{ data: points, borderColor: assets.find(a=>a.id===currentTab).color, tension: 0.4, fill: true, backgroundColor: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.02)' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

function fmt(n) { return Number(n).toLocaleString(undefined, { maximumFractionDigits: 2 }); }
async function login() { await _supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } }); }
async function logout() { await _supabase.auth.signOut(); location.reload(); }

(async () => {
    const theme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    const { data: { user } } = await _supabase.auth.getUser();
    if (user) { 
        currentUser = user; 
        document.getElementById('userEmail').innerText = user.email; 
        await loadData(); await fetchPrices(); setInterval(fetchPrices, 60000); 
    }
})();
