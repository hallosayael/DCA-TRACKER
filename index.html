<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DCA Tracker Pro - Fixed</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Inter;background:#f8fafc;margin:0;padding:15px}
.card{background:#fff;padding:20px;border-radius:16px;margin-bottom:20px}
input,select{padding:10px;width:100%;border-radius:8px;border:1px solid #ddd}
button{padding:12px;border:none;border-radius:10px;cursor:pointer;font-weight:700}
.btn{background:#2563eb;color:#fff}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
.hidden{display:none}
</style>
</head>
<body>

<h2>DCA Tracker Pro</h2>

<div class="card">
<select id="tipe">
<option value="BUY">BUY</option>
<option value="SELL">SELL / TP</option>
</select><br><br>
<input type="date" id="tanggal"><br><br>
<input type="number" id="harga" placeholder="Harga"><br><br>
<input type="number" id="nominal" placeholder="Nominal $"><br><br>
<button class="btn" onclick="tambah()">Simpan</button>
<button onclick="openCalc()">Calc</button>
</div>

<div class="card">
<div>Modal: <b id="modal">0</b></div>
<div>Qty: <b id="qty">0</b></div>
<div>Avg: <b id="avg">0</b></div>
<div>P/L: <b id="pl">0</b></div>
</div>

<div class="card">
<canvas id="chart" height="100"></canvas>
</div>

<div class="card">
<table>
<thead><tr><th>Tipe</th><th>Tgl</th><th>Harga</th><th>Nominal</th><th>Qty</th></tr></thead>
<tbody id="tabel"></tbody>
</table>
</div>

<script>
const SUPABASE_URL = 'https://iuqzuuyihrnangontxft.supabase.co';
const SUPABASE_KEY = 'sb_publishable_-26nDiKXaT6IkPJiTplAdQ_CV5H-MHm';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = [];
let chart;

/* ================== CORE LOGIC (FIX) ================== */
function calcPosition(list){
    let qty=0, modal=0;
    list.forEach(d=>{
        if(d.tipe==='BUY'){
            qty+=d.qty;
            modal+=d.nominal;
        }else{
            const avg=modal/qty;
            modal-=avg*Math.abs(d.qty);
            qty+=d.qty;
        }
    });
    return {qty,modal,avg:qty>0?modal/qty:0};
}
/* ====================================================== */

async function load(){
    const {data:rows}=await db.from('transaksi').select('*').order('tanggal',{ascending:true});
    data=rows||[];
    render();
}

async function tambah(){
    const tipe=tipeEl.value;
    const harga=+hargaEl.value;
    const nominal=+nominalEl.value;
    const qty=nominal/harga;

    const pos=calcPosition(data);
    if(tipe==='SELL' && qty>pos.qty) return alert("Saldo tidak cukup");

    await db.from('transaksi').insert([{
        tipe,tanggal:tanggalEl.value,harga,nominal,
        qty: tipe==='BUY'?qty:-qty
    }]);

    load();
}

function render(){
    const pos=calcPosition(data);
    modalEl.innerText=pos.modal.toFixed(2);
    qtyEl.innerText=pos.qty.toFixed(6);
    avgEl.innerText=pos.avg.toFixed(2);

    let rows='';
    data.forEach(d=>{
        rows+=`<tr>
        <td>${d.tipe}</td>
        <td>${d.tanggal}</td>
        <td>${d.harga}</td>
        <td>${d.nominal}</td>
        <td>${d.qty}</td>
        </tr>`;
    });
    tabel.innerHTML=rows;

    drawChart();
}

function drawChart(){
    let labels=[],points=[];
    let qty=0,modal=0;

    data.forEach(d=>{
        if(d.tipe==='BUY'){
            modal+=d.nominal;
            qty+=d.qty;
        }else{
            const avg=modal/qty;
            modal-=avg*Math.abs(d.qty);
            qty+=d.qty;
        }
        labels.push(d.tanggal);
        points.push(modal);
    });

    if(chart) chart.destroy();
    chart=new Chart(chartEl,{
        type:'line',
        data:{labels,datasets:[{data:points}]},
        options:{plugins:{legend:{display:false}}}
    });
}

/* ============ CALCULATOR ============ */
function openCalc(){
    const pos=calcPosition(data);
    const nominal=+prompt("Nominal beli?");
    const harga=+prompt("Harga beli?");
    const newQty=nominal/harga;
    const newAvg=(pos.modal+nominal)/(pos.qty+newQty);
    alert("New AVG: "+newAvg.toFixed(2));
}

/* DOM */
const tipeEl=tipe;
const tanggalEl=tanggal;
const hargaEl=harga;
const nominalEl=nominal;
const tabel=document.getElementById('tabel');
const modalEl=document.getElementById('modal');
const qtyEl=document.getElementById('qty');
const avgEl=document.getElementById('avg');
const chartEl=document.getElementById('chart');

load();
</script>
</body>
</html>
