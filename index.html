<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DCA Tracker Pro - Overall Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        h2 { font-weight: 700; text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        
        .tabs-container {
            overflow-x: auto;
            display: flex;
            background: #e2e8f0;
            padding: 5px;
            border-radius: 14px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

/* Update gaya tab agar lebih interaktif */
.tabs-container button {
    flex: 0 0 auto;
    padding: 10px 20px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: transparent;
    cursor: pointer;
    color: var(--text-muted);
    white-space: nowrap;
    border: 2px solid transparent; /* Tambahan agar ukuran tidak lompat saat aktif */
}

/* Tab Aktif secara umum */
.tabs-container button.active {
    background: var(--card);
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

/* Warna spesifik untuk tiap koin saat aktif */
.tabs-container button.active[data-coin="BTC"] { color: #F7931A; border-bottom: 2px solid #F7931A; }
.tabs-container button.active[data-coin="ETH"] { color: #3c3c3d; border-bottom: 2px solid #3c3c3d; }
.tabs-container button.active[data-coin="SOL"] { color: #A464FA; border-bottom: 2px solid #A464FA; }
.tabs-container button.active[data-coin="BNB"] { color: #F3BA2F; border-bottom: 2px solid #F3BA2F; }
.tabs-container button.active[data-coin="SUI"] { color: #6FBCF0; border-bottom: 2px solid #6FBCF0; }
.tabs-container button.active[data-coin="PAXG"] { color: #D4AF37; border-bottom: 2px solid #D4AF37; }
.tabs-container button.active[data-coin="OVERALL"] { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); margin-bottom: 15px; position: relative; overflow: hidden; }
        
        .coin-bg-icon {
            position: absolute; right: -20px; top: 50%; transform: translateY(-50%);
            width: 150px; height: 150px; opacity: 0.1; pointer-events: none; filter: grayscale(100%);
        }

        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; position: relative; z-index: 1; }
        label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; background: rgba(255,255,255,0.9); }

        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; position: relative; z-index: 1; }
        button { cursor: pointer; font-weight: 600; padding: 12px 18px; border-radius: 8px; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; flex: 1 1 200px; }
        .btn-secondary { background: #f1f5f9; color: var(--text-main); border: 1px solid var(--border); }
        .btn-share { background: #0f172a; color: white; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; position: relative; z-index: 1; }
        .stat-item { padding: 10px; border-left: 3px solid #f1f5f9; }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        .stat-value { font-size: 16px; font-weight: 700; margin-top: 4px; }

        .table-wrapper { overflow-x: auto; position: relative; z-index: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 12px; color: var(--text-muted); border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .badge-danger { color: var(--danger); cursor: pointer; font-weight: 600; font-size: 11px; }

        .profit { color: var(--success); }
        .loss { color: var(--danger); }
        #shareCanvas { display: none; }
        
        /* Hide Input Card on Overall */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>DCA Tracker Pro</h2>

    <div class="tabs-container" id="menuTabs">
        </div>

    <div class="card" id="inputCard">
        <img id="coinIcon" src="" class="coin-bg-icon" alt="coin logo">
        <div class="grid-inputs">
            <div><label>Tanggal</label><input type="date" id="tanggal"></div>
            <div><label>Harga Beli ($)</label><input type="number" id="harga" placeholder="0.00"></div>
            <div><label>Nominal ($)</label><input type="number" id="nominal" placeholder="0.00"></div>
        </div>
        <div class="btn-group">
            <button class="btn-primary" onclick="tambah()">+ Tambah Data</button>
            <button class="btn-share" onclick="generateShareImage()">📸 Share PNL</button>
            <button class="btn-secondary" onclick="exportCSV()">Export</button>
            <button class="btn-secondary" onclick="togglePrivacy()" id="privacyBtn">🔒</button>
        </div>
    </div>

    <div class="card stats-grid">
        <div class="stat-item"><div class="stat-label" id="labelModal">Total Modal</div><div class="stat-value" id="totalModal">0</div></div>
        <div class="stat-item" id="statAvg"><div class="stat-label">Avg. Buy Price</div><div class="stat-value" id="avgBuy">0</div></div>
        <div class="stat-item" id="statLive"><div class="stat-label">Live Price</div><div class="stat-value" id="livePrice" style="color: var(--primary)">0</div></div>
        <div class="stat-item"><div class="stat-label">Unrealized P/L ($)</div><div class="stat-value" id="upl">0</div></div>
        <div class="stat-item" style="border-left: 3px solid var(--primary)"><div class="stat-label">Profit / Loss (%)</div><div class="stat-value" id="uplPct">0%</div></div>
    </div>

    <div class="card">
        <div class="table-wrapper">
            <table id="mainTable">
                <thead id="tableHead"></thead>
                <tbody id="tabel"></tbody>
            </table>
        </div>
    </div>
</div>

<canvas id="shareCanvas" width="800" height="450"></canvas>

<script>
const assets = [
    { id: 'BTC', name: 'Bitcoin', geckoId: 'bitcoin', color: '#F7931A', logo: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
    { id: 'ETH', name: 'Ethereum', geckoId: 'ethereum', color: '#3c3c3d', logo: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
    { id: 'SOL', name: 'Solana', geckoId: 'solana', color: '#A464FA', logo: 'https://cryptologos.cc/logos/solana-sol-logo.png' },
    { id: 'BNB', name: 'Binance', geckoId: 'binancecoin', color: '#F3BA2F', logo: 'https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/bnb.png' },
    { id: 'SUI', name: 'Sui', geckoId: 'sui', color: '#6FBCF0', logo: 'https://cryptologos.cc/logos/sui-sui-logo.png' },
    { id: 'PAXG', name: 'Gold', geckoId: 'pax-gold', color: '#D4AF37', logo: 'https://cryptologos.cc/logos/pax-gold-paxg-logo.png' }
];

let currentTab = "OVERALL"; // Default ke Overall
let privacy = JSON.parse(localStorage.getItem("privacy")) || false;
let livePrices = {};
let data = {};

assets.forEach(asset => {
    data[asset.id] = JSON.parse(localStorage.getItem(`dca_${asset.id}`)) || [];
    livePrices[asset.id] = 0;
});

function renderTabs() {
    const container = document.getElementById('menuTabs');
    let html = `
        <button class="${currentTab === 'OVERALL' ? 'active' : ''}" 
                data-coin="OVERALL" 
                onclick="switchTab('OVERALL')">
            OVERALL
        </button>
    `;
    
    html += assets.map(asset => `
        <button class="${currentTab === asset.id ? 'active' : ''}" 
                data-coin="${asset.id}" 
                onclick="switchTab('${asset.id}')">
            ${asset.id}
        </button>
    `).join('');
    
    container.innerHTML = html;
}

function switchTab(tabId){
    currentTab = tabId;
    renderTabs();
    
    const inputCard = document.getElementById("inputCard");
    const statAvg = document.getElementById("statAvg");
    const statLive = document.getElementById("statLive");
    const labelModal = document.getElementById("labelModal");

    if(tabId === "OVERALL") {
        inputCard.classList.add("hidden");
        statAvg.classList.add("hidden");
        statLive.classList.add("hidden");
        labelModal.innerText = "Portfolio Value";
    } else {
        inputCard.classList.remove("hidden");
        statAvg.classList.remove("hidden");
        statLive.classList.remove("hidden");
        labelModal.innerText = "Total Modal";
        const asset = assets.find(a => a.id === tabId);
        document.getElementById("coinIcon").src = asset.logo;
    }
    render();
}

function tambah(){
    let tgl = document.getElementById("tanggal").value;
    let harga = Number(document.getElementById("harga").value);
    let nominal = Number(document.getElementById("nominal").value);
    if(!tgl || !harga || !nominal) return alert("Isi data!");
    data[currentTab].push({tgl, harga, nominal, qty: nominal / harga});
    localStorage.setItem(`dca_${currentTab}`, JSON.stringify(data[currentTab]));
    render();
}

function hapus(i){
    if(confirm("Hapus?")){
        data[currentTab].splice(i,1);
        localStorage.setItem(`dca_${currentTab}`, JSON.stringify(data[currentTab]));
        render();
    }
}

function togglePrivacy(){
    privacy = !privacy;
    localStorage.setItem("privacy", JSON.stringify(privacy));
    render();
}

async function fetchPrices(){
    try {
        const ids = assets.map(a => a.geckoId).join(',');
        let res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
        let json = await res.json();
        assets.forEach(asset => {
            if(json[asset.geckoId]) livePrices[asset.id] = json[asset.geckoId].usd;
        });
        render();
    } catch(e) { console.log("Fetch failed"); }
}

function render(){
    const tableHead = document.getElementById("tableHead");
    const tbody = document.getElementById("tabel");
    document.getElementById("privacyBtn").innerHTML = privacy ? "🔓" : "🔒";

    if(currentTab === "OVERALL") {
        // --- LOGIKA OVERALL ---
        tableHead.innerHTML = `<tr><th>Asset</th><th>Total Modal</th><th>Market Value</th><th>P/L ($)</th><th>P/L (%)</th></tr>`;
        let totalPortfolioModal = 0;
        let totalPortfolioValue = 0;
        let rowsHtml = "";

        assets.forEach(asset => {
            let assetModal = 0;
            let assetQty = 0;
            data[asset.id].forEach(d => {
                assetModal += d.nominal;
                assetQty += d.qty;
            });

            if(assetModal > 0) {
                let liveVal = assetQty * livePrices[asset.id];
                let assetUpl = liveVal - assetModal;
                let assetPct = (assetUpl / assetModal) * 100;

                totalPortfolioModal += assetModal;
                totalPortfolioValue += liveVal;

                rowsHtml += `<tr>
                    <td><b>${asset.id}</b></td>
                    <td>${privacy ? "••••" : "$" + assetModal.toLocaleString()}</td>
                    <td>${privacy ? "••••" : "$" + liveVal.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
                    <td class="${assetUpl >= 0 ? 'profit' : 'loss'}">${privacy ? "••••" : (assetUpl >= 0 ? '+':'' ) + "$" + assetUpl.toLocaleString(undefined,{maximumFractionDigits:2})}</td>
                    <td class="${assetUpl >= 0 ? 'profit' : 'loss'}">${assetPct.toFixed(2)}%</td>
                </tr>`;
            }
        });

        tbody.innerHTML = rowsHtml || `<tr><td colspan="5" style="text-align:center">Belum ada data di semua aset.</td></tr>`;
        
        // Update Stats Overall
        let netUpl = totalPortfolioValue - totalPortfolioModal;
        let netPct = totalPortfolioModal ? (netUpl / totalPortfolioModal) * 100 : 0;

        document.getElementById("totalModal").innerText = privacy ? "••••" : "$" + totalPortfolioValue.toLocaleString(undefined,{maximumFractionDigits:2});
        document.getElementById("upl").innerText = privacy ? "••••" : (netUpl >= 0 ? '+':'' ) + "$" + netUpl.toLocaleString(undefined,{maximumFractionDigits:2});
        document.getElementById("upl").className = `stat-value ${netUpl >= 0 ? 'profit' : 'loss'}`;
        document.getElementById("uplPct").innerText = (netUpl >= 0 ? "▲ " : "▼ ") + netPct.toFixed(2) + "%";
        document.getElementById("uplPct").className = `stat-value ${netUpl >= 0 ? 'profit' : 'loss'}`;

    } else {
        // --- LOGIKA ASSET SATUAN ---
        tableHead.innerHTML = `<tr><th>Tanggal</th><th>Harga Beli</th><th>Nominal</th><th>Qty</th><th>Aksi</th></tr>`;
        let totalModal = 0; let totalQty = 0;
        let rowsHtml = "";

        data[currentTab].forEach((d,i)=>{
            totalModal += d.nominal; totalQty += d.qty;
            rowsHtml += `<tr>
                <td>${d.tgl}</td>
                <td>$${d.harga.toLocaleString()}</td>
                <td>${privacy ? "••••" : "$"+d.nominal.toLocaleString()}</td>
                <td>${privacy ? "••••" : d.qty.toFixed(8)}</td>
                <td><span class="badge-danger" onclick="hapus(${i})">Hapus</span></td>
            </tr>`;
        });
        tbody.innerHTML = rowsHtml;

        let avgBuy = totalQty > 0 ? (totalModal / totalQty) : 0;
        let price = livePrices[currentTab];
        let upl = (totalQty * price) - totalModal;
        let uplPct = totalModal ? (upl / totalModal) * 100 : 0;

        document.getElementById("totalModal").innerText = privacy ? "••••" : "$" + totalModal.toLocaleString();
        document.getElementById("avgBuy").innerText = "$" + avgBuy.toLocaleString(undefined, {maximumFractionDigits: 2});
        document.getElementById("livePrice").innerText = price ? "$" + price.toLocaleString() : "---";
        document.getElementById("upl").innerText = privacy ? "••••" : (upl >= 0 ? "+" : "") + "$" + upl.toLocaleString(undefined, {maximumFractionDigits: 2});
        document.getElementById("upl").className = `stat-value ${upl >= 0 ? "profit" : "loss"}`;
        document.getElementById("uplPct").innerText = (upl >= 0 ? "▲ " : "▼ ") + uplPct.toFixed(2) + "%";
        document.getElementById("uplPct").className = `stat-value ${upl >= 0 ? "profit" : "loss"}`;
    }
}

// Fungsi generateShareImage tetap sama, namun tambahkan proteksi jika di tab Overall
function generateShareImage() {
    if(currentTab === "OVERALL") return alert("Gunakan tab koin spesifik untuk share PNL.");
    // ... (rest of share logic from previous code)
    const canvas = document.getElementById("shareCanvas");
    const ctx = canvas.getContext("2d");
    const asset = assets.find(a => a.id === currentTab);
    const assetModal = data[currentTab].reduce((a, b) => a + b.nominal, 0);
    const assetQty = data[currentTab].reduce((a, b) => a + b.qty, 0);
    const price = livePrices[currentTab];
    const upl = (assetQty * price) - assetModal;
    const uplPct = assetModal ? (upl / assetModal) * 100 : 0;
    const isProfit = upl >= 0;
    const colorPNL = isProfit ? "#10b981" : "#ef4444";

    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "right";
    if (currentTab === "BTC") { ctx.fillStyle = "#F7931A"; ctx.font = "bold 80px Inter"; ctx.fillText("₿ BTC", 750, 110); }
    else if (currentTab === "SOL") { ctx.fillStyle = "#A464FA"; ctx.font = "bold 80px Inter"; ctx.fillText("SOL", 750, 110); }
    else if (currentTab === "ETH") { ctx.fillStyle = "#9ca3af"; ctx.font = "bold 80px Inter"; ctx.fillText("ETH", 750, 110); }
    else { ctx.fillStyle = asset.color; ctx.font = "bold 80px Inter"; ctx.fillText(currentTab, 750, 110); }
    
    ctx.textAlign = "left";
    ctx.fillStyle = "white"; ctx.font = "bold 28px Inter"; ctx.fillText(`${asset.name} Performance`, 50, 60);
    ctx.fillStyle = "#64748b"; ctx.font = "16px Inter"; ctx.fillText("DCA Tracker Pro • Snapshot", 50, 90);
    ctx.fillStyle = colorPNL; ctx.font = "bold 100px Inter"; ctx.fillText((isProfit ? "+" : "") + uplPct.toFixed(2) + "%", 50, 220);
    ctx.font = "bold 20px Inter"; ctx.fillText(isProfit ? "PROFIT" : "LOSS", 55, 250);
    ctx.strokeStyle = "#334155"; ctx.beginPath(); ctx.moveTo(50, 280); ctx.lineTo(750, 280); ctx.stroke();
    
    const drawSub = (l, v, x) => { ctx.fillStyle = "#94a3b8"; ctx.font = "14px Inter"; ctx.fillText(l, x, 320); ctx.fillStyle = "white"; ctx.font = "bold 24px Inter"; ctx.fillText(v, x, 355); };
    drawSub("AVG BUY", "$" + (assetQty ? (assetModal/assetQty).toLocaleString(undefined,{maximumFractionDigits:2}) : 0), 50);
    drawSub("LAST PRICE", "$" + price.toLocaleString(), 300);
    drawSub("ASSET", currentTab, 550);
    ctx.fillStyle = "#334155"; ctx.fillRect(0, 400, 800, 50);
    ctx.fillStyle = "#94a3b8"; ctx.font = "italic 14px Inter"; ctx.fillText("Strategy: Martingale DCA Tracking System", 50, 430);
    const a = document.createElement('a'); a.download = `PNL_${currentTab}.png`; a.href = canvas.toDataURL("image/png"); a.click();
}

function exportCSV(){
    if(currentTab === "OVERALL") return alert("Pilih aset spesifik untuk export.");
    let rows = [["Tanggal","Harga","Nominal","Qty"]];
    data[currentTab].forEach(d => rows.push([d.tgl, d.harga, d.nominal, d.qty]));
    let csv = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
    let link = document.createElement("a");
    link.href = encodeURI(csv);
    link.download = `DCA_${currentTab}.csv`;
    link.click();
}

fetchPrices();
setInterval(fetchPrices, 60000);
switchTab("OVERALL");
</script>
</body>
</html>
